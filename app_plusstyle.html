<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlusStyle App</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }
    .container { padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
    button { padding:10px; border:none; background:#ff6b81; color:white; border-radius:8px; }
    input { padding:10px; width:100%; margin:5px 0; }
  </style>
</head>
<body>

<div class="container" id="home">
  <h2>PlusStyle</h2>
  <p>Moda inclusiva para todos os corpos 💖</p>
  <button onclick="goTo('cadastro')">Começar</button>
</div>

<div class="container" id="cadastro" style="display:none">
  <h2>Cadastro</h2>
  <input placeholder="Altura">
  <input placeholder="Peso">
  <input placeholder="Estilo (casual, social...)">
  <button onclick="goTo('sugestoes')">Ver sugestões</button>
</div>

<div class="container" id="sugestoes" style="display:none">
  <h2>Roupas para você</h2>
  <div class="card">Vestido Casual Plus Size</div>
  <div class="card">Calça Jeans Confortável</div>
  <div class="card">Blusa Estilosa</div>
  <button onclick="goTo('lojas')">Ver lojas</button>
</div>

<div class="container" id="lojas" style="display:none">
  <h2>Lojas inclusivas</h2>
  <div class="card">Loja Plus Curitiba</div>
  <div class="card">Moda Livre Store</div>
  <button onclick="goTo('home')">Voltar</button>
</div>

<script>
function goTo(page){
  document.getElementById('home').style.display='none';
  document.getElementById('cadastro').style.display='none';
  document.getElementById('sugestoes').style.display='none';
  document.getElementById('lojas').style.display='none';
  document.getElementById(page).style.display='block';
}
</script>

</body>
</html>
