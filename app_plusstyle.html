<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PlusStyle</title>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.card { background:white; padding:10px; margin:15px; border-radius:10px; }
img { width:200px; border-radius:10px; }
button { padding:10px; background:#ff6b81; color:white; border:none; border-radius:8px; }
</style>

</head>
<body>

<h2>PlusStyle 💖</h2>
<button onclick="mostrar('cadastro')">Começar</button>

<div id="cadastro" style="display:none">
  <h3>Cadastro</h3>
  <input placeholder="Seu estilo"><br><br>
  <button onclick="mostrar('roupas')">Ver roupas</button>
</div>

<div id="roupas" style="display:none">

  <h3>Roupas 👗</h3>

  <div class="card">
    <img src="https://img.ltwebstatic.com/v4/j/pi/2025/10/27/98/1761562396bad7da6044bf41beef21dc52f4ce6c7b_thumbnail_405x552.jpg">
    <p>Blusa</p>
    <p>R$ 79,90</p>
    <button onclick="alert('Indo para compra')">Comprar</button>
  </div>

  <div class="card">
    <img src="https://img.ltwebstatic.com/v4/j/pi/2025/09/30/36/1759225497a9d8a7795f85b14e0419a9b53b589b92_thumbnail_405x552.jpg">
    <p>Conjunto branco</p>
    <p>R$ 149,90</p>
    <button onclick="alert('Indo para compra')">Comprar</button>
  </div>

  <div class="card">
    <img src="https://img.ltwebstatic.com/v4/j/pi/2025/08/25/78/1756118482d0143cb5edd9740e20daf0fd09f213ed_thumbnail_405x552.jpg">
    <p>Conjunto azul</p>
    <p>R$ 159,90</p>
    <button onclick="alert('Indo para compra')">Comprar</button>
  </div>

  <div class="card">
    <img src="https://img.ltwebstatic.com/images3_pi/2023/12/01/d9/170142017329dcc361fb963d7bbca4761469a521bf_thumbnail_405x552.jpg">
    <p>Vestido preto</p>
    <p>R$ 129,90</p>
    <button onclick="alert('Indo para compra')">Comprar</button>
  </div>

  <button onclick="mostrar('loja')">Ir para loja</button>

</div>

<div id="loja" style="display:none">
  <h3>Lojas 🛍️</h3>
  <p>Loja Inclusiva Curitiba</p>
  <button onclick="mostrar('home')">Voltar</button>
</div>

<script>
function mostrar(id){
  document.getElementById('cadastro').style.display='none';
  document.getElementById('roupas').style.display='none';
  document.getElementById('loja').style.display='none';
  document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
